{% extends "admin/admin_layout.html" %}
{% block content %}
<div class="container py-4">
  <h3>New Blocked Slot</h3>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Cafe (optional)</label>
      <select name="cafe_id" class="form-control">
        <option value="">-- select --</option>
        {% for c in cafes %}
          <option value="{{ c.id }}">{{ c.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Decoration (optional)</label>
      <select name="decoration_id" class="form-control">
        <option value="">-- select --</option>
        {% for d in decs %}
          <option value="{{ d.id }}">{{ d.title }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Date</label>
      <input name="date" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Time</label>
      <input name="time" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Reason</label>
      <textarea name="reason" class="form-control"></textarea>
    </div>
    <button class="btn btn-primary">Save</button>
    <a class="btn btn-secondary" href="{{ url_for('admin_blocked_slots_list') }}">Cancel</a>
  </form>
</div>
{% endblock %}
